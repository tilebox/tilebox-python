name: Publish Tilebox Storage

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and Publish Tilebox Storage
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for checkout
      id-token: write # required trusted publishing to pypi.org
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          lfs: true
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.13"
          enable-cache: true
          cache-python: true
          cache-dependency-glob: "uv.lock"
      - name: Print version
        run: git describe --tags
      - name: Build
        run: mkdir dist && uv run python -m build tilebox-storage && mv tilebox-storage/dist/* dist/
      - name: Publish to PyPi.org
        if: github.event_name == 'release'
        # authorization is done via OIDC, so we don't need to specify a token
        # Instead, we've set up a trusted publishing config on pypi.org, that maps to this repository and the
        # publish_tilebox_storage workflow and maps it to the tilebox-storage package on pypi.org
        uses: pypa/gh-action-pypi-publish@release/v1
